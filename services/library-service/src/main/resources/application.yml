spring:
  application:
    name: library-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bookhub_library}
    username: ${DB_USERNAME:bookhub}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}

server:
  port: ${SERVER_PORT:8083}

management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: unrestricted
    health:
      probes:
        enabled: true
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    propagation:
      type: w3c
    sampling:
      probability: 1.0

logging:
  include-application-name: false
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "

jwt:
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}
  rsa:
    public-key: ${JWT_RSA_PUBLIC_KEY}

catalog:
  service:
    base-url: ${CATALOG_SERVICE_URL:http://localhost:8082}

identity:
  service:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}

service:
  client-id: ${SERVICE_CLIENT_ID}
  client-secret: ${SERVICE_CLIENT_SECRET}
