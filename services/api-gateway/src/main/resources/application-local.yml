spring:
  config:
    activate:
      on-profile: local
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity-auth-route
              uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/auth/**
            - id: identity-users-route
              uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/users/**
            - id: catalog-books-route
              uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/books/**
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoint:
    health:
      show-details: always
