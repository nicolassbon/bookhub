spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_FIRST
      routes:
        - id: identity-auth-route
          uri: ${IDENTITY_SERVICE_URL:http://identity-service:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: identity-users-route
          uri: ${IDENTITY_SERVICE_URL:http://identity-service:8081}
          predicates:
            - Path=/api/v1/users/**
        - id: catalog-books-route
          uri: ${CATALOG_SERVICE_URL:http://catalog-service:8082}
          predicates:
            - Path=/api/v1/books/**
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins: ${GATEWAY_CORS_ALLOWED_ORIGINS:https://bookhub.app}
            allowedMethods: GET,POST,PUT,PATCH,DELETE,OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
