spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_FIRST
          routes:
            - id: identity-auth-route
              uri: ${IDENTITY_SERVICE_URL:http://identity-service:8081}
              predicates:
                - Path=/api/v1/auth/**
            - id: identity-users-route
              uri: ${IDENTITY_SERVICE_URL:http://identity-service:8081}
              predicates:
                - Path=/api/v1/users/**
            - id: library-book-reviews-route
              uri: ${LIBRARY_SERVICE_URL:http://library-service:8083}
              predicates:
                - Path=/api/v1/books/{bookId}/reviews
            - id: catalog-books-route
              uri: ${CATALOG_SERVICE_URL:http://catalog-service:8082}
              predicates:
                - Path=/api/v1/books/**
            - id: library-route
              uri: ${LIBRARY_SERVICE_URL:http://library-service:8083}
              predicates:
                - Path=/api/v1/library/**
            - id: library-goals-route
              uri: ${LIBRARY_SERVICE_URL:http://library-service:8083}
              predicates:
                - Path=/api/v1/goals/**
            - id: library-reviews-route
              uri: ${LIBRARY_SERVICE_URL:http://library-service:8083}
              predicates:
                - Path=/api/v1/reviews/**
            - id: library-notifications-route
              uri: ${LIBRARY_SERVICE_URL:http://library-service:8083}
              predicates:
                - Path=/api/v1/notifications/**
            - id: identity-admin-route
              uri: ${IDENTITY_SERVICE_URL:http://identity-service:8081}
              predicates:
                - Path=/api/v1/admin/users/**
            - id: catalog-admin-route
              uri: ${CATALOG_SERVICE_URL:http://catalog-service:8082}
              predicates:
                - Path=/api/v1/admin/books/**
            - id: library-admin-route
              uri: ${LIBRARY_SERVICE_URL:http://library-service:8083}
              predicates:
                - Path=/api/v1/admin/reviews/**, /api/v1/admin/metrics/**
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins: ${GATEWAY_CORS_ALLOWED_ORIGINS:https://bookhub.app}
                allowedMethods: GET,POST,PUT,PATCH,DELETE,OPTIONS
                allowedHeaders: "*"
                allowCredentials: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      access: unrestricted
    health:
      probes:
        enabled: true
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    propagation:
      type: w3c
    sampling:
      probability: 1.0

logging:
  include-application-name: false
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
