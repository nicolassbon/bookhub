spring:
  application:
    name: catalog-service
  threads:
    virtual:
      enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bookhub_catalog}
    username: ${DB_USERNAME:bookhub}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}

server:
  port: ${SERVER_PORT:8082}

management:
  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: unrestricted
    health:
      probes:
        enabled: true
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    propagation:
      type: w3c
    sampling:
      probability: 1.0

logging:
  include-application-name: false
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "

jwt:
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}
  rsa:
    public-key: ${JWT_RSA_PUBLIC_KEY}

catalog:
  # OpenLibrary timeouts and circuit-open states return degraded or empty search results.
  providers:
    openlibrary:
      enabled: ${CATALOG_OPENLIBRARY_ENABLED:true}
      url: ${CATALOG_OPENLIBRARY_URL:https://openlibrary.org}
      timeout-ms: ${CATALOG_OPENLIBRARY_TIMEOUT_MS:2000}
      circuit-breaker:
        name: ${CATALOG_OPENLIBRARY_CIRCUIT_BREAKER_NAME:openLibrary}
        sliding-window-size: ${CATALOG_OPENLIBRARY_CIRCUIT_BREAKER_SLIDING_WINDOW_SIZE:10}
        minimum-number-of-calls: ${CATALOG_OPENLIBRARY_CIRCUIT_BREAKER_MINIMUM_NUMBER_OF_CALLS:5}
        failure-rate-threshold: ${CATALOG_OPENLIBRARY_CIRCUIT_BREAKER_FAILURE_RATE_THRESHOLD:50}
        wait-duration-open-state-ms: ${CATALOG_OPENLIBRARY_CIRCUIT_BREAKER_WAIT_DURATION_OPEN_STATE_MS:30000}
        permitted-number-of-calls-in-half-open-state: ${CATALOG_OPENLIBRARY_CIRCUIT_BREAKER_PERMITTED_HALF_OPEN_CALLS:2}
