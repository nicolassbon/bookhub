spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bookhub_identity}
    username: ${DB_USERNAME:bookhub}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: true

server:
  port: ${SERVER_PORT:8081}

management:
  endpoint:
    health:
      show-details: always

jwt:
  issuer: ${JWT_ISSUER:bookhub-identity-local}
  audience: ${JWT_AUDIENCE:bookhub-api-local}
  expiration: ${JWT_EXPIRATION:3600}
  rsa:
    private-key: ${JWT_RSA_PRIVATE_KEY:}
    public-key: ${JWT_RSA_PUBLIC_KEY:}

auth:
  refresh-token:
    expiration-seconds: ${REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
    hash-secret: ${REFRESH_TOKEN_HASH_SECRET:local-refresh-token-secret}
    cookie:
      name: ${REFRESH_TOKEN_COOKIE_NAME:refresh_token}
      path: ${REFRESH_TOKEN_COOKIE_PATH:/api/v1/auth}
      same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Strict}
      secure: ${REFRESH_TOKEN_COOKIE_SECURE:true}
