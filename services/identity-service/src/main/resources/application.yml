spring:
  application:
    name: identity-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bookhub_identity}
    username: ${DB_USERNAME:bookhub}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600}

auth:
  refresh-token:
    expiration-seconds: ${REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
    cookie:
      name: ${REFRESH_TOKEN_COOKIE_NAME:refresh_token}
      path: ${REFRESH_TOKEN_COOKIE_PATH:/api/v1/auth}
      same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Strict}
      secure: ${REFRESH_TOKEN_COOKIE_SECURE:true}
