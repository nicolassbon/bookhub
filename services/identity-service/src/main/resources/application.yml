spring:
  application:
    name: identity-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bookhub_identity}
    username: ${DB_USERNAME:bookhub}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

jwt:
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}
  expiration: ${JWT_EXPIRATION:3600}
  rsa:
    private-key: ${JWT_RSA_PRIVATE_KEY}
    public-key: ${JWT_RSA_PUBLIC_KEY}

service:
  client-id: ${SERVICE_CLIENT_ID}
  client-secret: ${SERVICE_CLIENT_SECRET}

auth:
  refresh-token:
    expiration-seconds: ${REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
    hash-secret: ${REFRESH_TOKEN_HASH_SECRET}
    cookie:
      name: ${REFRESH_TOKEN_COOKIE_NAME:refresh_token}
      path: ${REFRESH_TOKEN_COOKIE_PATH:/api/v1/auth}
      same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Strict}
      secure: ${REFRESH_TOKEN_COOKIE_SECURE:true}
  password-reset:
    expiration-seconds: ${PASSWORD_RESET_EXPIRATION_SECONDS:900}
    url-base: ${PASSWORD_RESET_URL_BASE:https://bookhub.app/reset-password?token=}
    from-address: ${PASSWORD_RESET_FROM_ADDRESS:noreply@bookhub.app}
    hash-secret: ${PASSWORD_RESET_HASH_SECRET}
  rate-limit:
    login:
      max-attempts: ${AUTH_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:10}
      window-seconds: ${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
    register:
      max-attempts: ${AUTH_RATE_LIMIT_REGISTER_MAX_ATTEMPTS:5}
      window-seconds: ${AUTH_RATE_LIMIT_REGISTER_WINDOW_SECONDS:300}
    forgot-password:
      max-attempts: ${AUTH_RATE_LIMIT_FORGOT_PASSWORD_MAX_ATTEMPTS:5}
      window-seconds: ${AUTH_RATE_LIMIT_FORGOT_PASSWORD_WINDOW_SECONDS:300}
    refresh:
      max-attempts: ${AUTH_RATE_LIMIT_REFRESH_MAX_ATTEMPTS:15}
      window-seconds: ${AUTH_RATE_LIMIT_REFRESH_WINDOW_SECONDS:60}
    service-token:
      max-attempts: ${AUTH_RATE_LIMIT_SERVICE_TOKEN_MAX_ATTEMPTS:20}
      window-seconds: ${AUTH_RATE_LIMIT_SERVICE_TOKEN_WINDOW_SECONDS:60}
    trust-forwarded-headers: ${AUTH_RATE_LIMIT_TRUST_FORWARDED_HEADERS:true}
    trusted-proxy-cidrs: ${AUTH_RATE_LIMIT_TRUSTED_PROXY_CIDRS:172.16.0.0/12,127.0.0.1/32,::1/128}
    redis:
      key-prefix: ${AUTH_RATE_LIMIT_REDIS_KEY_PREFIX:bookhub:identity:auth-rate-limit:v1}
      failure-mode: ${AUTH_RATE_LIMIT_REDIS_FAILURE_MODE:FAIL_CLOSED}
