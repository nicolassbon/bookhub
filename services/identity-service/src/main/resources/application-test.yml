spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:identity_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:2525}
    username: ${SPRING_MAIL_USERNAME:test}
    password: ${SPRING_MAIL_PASSWORD:test}

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  issuer: ${JWT_ISSUER:bookhub-identity}
  audience: ${JWT_AUDIENCE:bookhub-api}
  expiration: ${JWT_EXPIRATION:3600}
  rsa:
    private-key: ${JWT_RSA_PRIVATE_KEY}
    public-key: ${JWT_RSA_PUBLIC_KEY}

auth:
  refresh-token:
    expiration-seconds: ${REFRESH_TOKEN_EXPIRATION_SECONDS:604800}
    cookie:
      name: ${REFRESH_TOKEN_COOKIE_NAME:refresh_token}
      path: ${REFRESH_TOKEN_COOKIE_PATH:/api/v1/auth}
      same-site: ${REFRESH_TOKEN_COOKIE_SAME_SITE:Strict}
      secure: ${REFRESH_TOKEN_COOKIE_SECURE:false}
  password-reset:
    expiration-seconds: ${PASSWORD_RESET_EXPIRATION_SECONDS:900}
    url-base: ${PASSWORD_RESET_URL_BASE:https://bookhub.test/reset-password?token=}
    from-address: ${PASSWORD_RESET_FROM_ADDRESS:noreply@bookhub.test}
    hash-secret: ${PASSWORD_RESET_HASH_SECRET:${random.uuid}}
  rate-limit:
    login:
      max-attempts: ${AUTH_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:10}
      window-seconds: ${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
    register:
      max-attempts: ${AUTH_RATE_LIMIT_REGISTER_MAX_ATTEMPTS:10}
      window-seconds: ${AUTH_RATE_LIMIT_REGISTER_WINDOW_SECONDS:60}
    forgot-password:
      max-attempts: ${AUTH_RATE_LIMIT_FORGOT_PASSWORD_MAX_ATTEMPTS:10}
      window-seconds: ${AUTH_RATE_LIMIT_FORGOT_PASSWORD_WINDOW_SECONDS:60}
