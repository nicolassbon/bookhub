spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:identity_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  secret: ${JWT_SECRET:test-signing-secret-test-signing-secret-1234}
  expiration: ${JWT_EXPIRATION:3600}
