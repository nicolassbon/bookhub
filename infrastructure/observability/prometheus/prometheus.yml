global:
  scrape_interval: 15s

# Initial scaffold configuration.
# Add authentication, relabeling, and retention tuning as the platform evolves.

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: identity-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["identity-service:8081"]

  - job_name: catalog-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["catalog-service:8082"]

  - job_name: library-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["library-service:8083"]
