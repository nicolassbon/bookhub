name: bookhub-local

# Initial local scaffold.
# This compose file is intentionally minimal and will evolve with each service.

services:
  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      identity-service:
        condition: service_started
      catalog-service:
        condition: service_started
      library-service:
        condition: service_started
    networks:
      - bookhub-network

  identity-service:
    build:
      context: ../../services/identity-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://identity-db:5432/bookhub_identity
      SPRING_DATASOURCE_USERNAME: bookhub
      SPRING_DATASOURCE_PASSWORD: bookhub
    depends_on:
      identity-db:
        condition: service_healthy
    networks:
      - bookhub-network

  catalog-service:
    build:
      context: ../../services/catalog-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://catalog-db:5432/bookhub_catalog
      SPRING_DATASOURCE_USERNAME: bookhub
      SPRING_DATASOURCE_PASSWORD: bookhub
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - bookhub-network

  library-service:
    build:
      context: ../../services/library-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://library-db:5432/bookhub_library
      SPRING_DATASOURCE_USERNAME: bookhub
      SPRING_DATASOURCE_PASSWORD: bookhub
    depends_on:
      library-db:
        condition: service_healthy
    networks:
      - bookhub-network

  identity-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookhub_identity
      POSTGRES_USER: bookhub
      POSTGRES_PASSWORD: bookhub
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bookhub -d bookhub_identity']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    networks:
      - bookhub-network

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookhub_catalog
      POSTGRES_USER: bookhub
      POSTGRES_PASSWORD: bookhub
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bookhub -d bookhub_catalog']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    networks:
      - bookhub-network

  library-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookhub_library
      POSTGRES_USER: bookhub
      POSTGRES_PASSWORD: bookhub
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bookhub -d bookhub_library']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - library-db-data:/var/lib/postgresql/data
    networks:
      - bookhub-network

networks:
  bookhub-network:
    driver: bridge

volumes:
  identity-db-data:
  catalog-db-data:
  library-db-data:
