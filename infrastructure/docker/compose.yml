name: bookhub-local

# Initial local scaffold.
# This compose file is intentionally minimal and will evolve with each service.

services:
  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: local
      IDENTITY_SERVICE_URL: http://identity-service:8081
      CATALOG_SERVICE_URL: http://catalog-service:8082
      LIBRARY_SERVICE_URL: http://library-service:8083
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      identity-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      library-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bookhub-network

  identity-service:
    build:
      context: ../../
      dockerfile: services/identity-service/Dockerfile
    env_file:
      - ../../.env
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://identity-db:5432/bookhub_identity
      DB_USERNAME: bookhub
      DB_PASSWORD: bookhub
      JWT_ISSUER: ${JWT_ISSUER:-bookhub-identity-local}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-bookhub-api-local}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-localhost}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-false}
      REDIS_HOST: identity-redis
      REDIS_PORT: 6379
      AUTH_RATE_LIMIT_REDIS_KEY_PREFIX: bookhub:identity:auth-rate-limit:v1
      AUTH_RATE_LIMIT_REDIS_FAILURE_MODE: FAIL_CLOSED
      AUTH_RATE_LIMIT_TRUST_FORWARDED_HEADERS: true
      AUTH_RATE_LIMIT_TRUSTED_PROXY_CIDRS: 172.16.0.0/12
    depends_on:
      identity-db:
        condition: service_healthy
      identity-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8081/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bookhub-network

  catalog-service:
    build:
      context: ../../
      dockerfile: services/catalog-service/Dockerfile
    env_file:
      - ../../.env
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://catalog-db:5432/bookhub_catalog
      DB_USERNAME: bookhub
      DB_PASSWORD: bookhub
      JWT_ISSUER: ${JWT_ISSUER:-bookhub-identity-local}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-bookhub-api-local}
    depends_on:
      catalog-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8082/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bookhub-network

  library-service:
    build:
      context: ../../
      dockerfile: services/library-service/Dockerfile
    env_file:
      - ../../.env
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://library-db:5432/bookhub_library
      DB_USERNAME: bookhub
      DB_PASSWORD: bookhub
      JWT_ISSUER: ${JWT_ISSUER:-bookhub-identity-local}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-bookhub-api-local}
      CATALOG_SERVICE_URL: http://catalog-service:8082
      IDENTITY_SERVICE_URL: http://identity-service:8081
    depends_on:
      library-db:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8083/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bookhub-network

  identity-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - identity-redis-data:/data
    networks:
      - bookhub-network

  identity-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookhub_identity
      POSTGRES_USER: bookhub
      POSTGRES_PASSWORD: bookhub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookhub -d bookhub_identity"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    networks:
      - bookhub-network

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookhub_catalog
      POSTGRES_USER: bookhub
      POSTGRES_PASSWORD: bookhub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookhub -d bookhub_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    networks:
      - bookhub-network

  library-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookhub_library
      POSTGRES_USER: bookhub
      POSTGRES_PASSWORD: bookhub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookhub -d bookhub_library"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - library-db-data:/var/lib/postgresql/data
    networks:
      - bookhub-network

  prometheus:
    image: prom/prometheus:v3.4.0
    volumes:
      - ../../infrastructure/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    networks:
      - bookhub-network

  grafana:
    image: grafana/grafana:12.0.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: false
    volumes:
      - ../../infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../infrastructure/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - bookhub-network

networks:
  bookhub-network:
    driver: bridge

volumes:
  identity-db-data:
  identity-redis-data:
  catalog-db-data:
  library-db-data:
  prometheus-data:
  grafana-data:
